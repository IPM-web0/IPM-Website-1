<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Photo Gallery | Inalyze Property Management</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    /* Gallery specific styles */
    .gallery-header {
      text-align: center;
      margin: 40px 0 30px;
    }
    
    .gallery-header h1 {
      font-size: 2.5rem;
      color: #02093f;
      margin-bottom: 16px;
    }
    
    .gallery-header p {
      color: #4a5568;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
      margin: 40px 0;
    }
    
    .gallery-item {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    
    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }
    
    .gallery-item img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }
    
    .gallery-info {
      padding: 16px;
    }
    
    .gallery-info h3 {
      font-size: 1.1rem;
      color: #02093f;
      margin-bottom: 8px;
    }
    
    .gallery-info p {
      color: #666;
      font-size: 0.9rem;
    }
    
    /* Lightbox modal */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 8px;
    }
    
    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 40px;
      color: white;
      font-size: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .close-lightbox:hover {
      color: #ddd;
    }
    
    /* Admin add button */
    .admin-controls {
      text-align: right;
      margin: 20px 0;
    }
    
    .add-photo-btn {
      background: #02093f;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    
    .add-photo-btn:hover {
      background: #1a2a6e;
      transform: scale(1.02);
    }
    
    /* Upload form */
    .upload-form {
      display: none;
      background: white;
      padding: 30px;
      border-radius: 20px;
      margin: 20px 0;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }
    
    .upload-form.active {
      display: block;
    }
    
    .upload-form input,
    .upload-form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
    }
    
    .upload-form button {
      background: #02093f;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }
      
      .gallery-item img {
        height: 220px;
      }
      
      .gallery-header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">
          <img src="./images/Logo FULL.PNG" alt="Inalyze Property Logo">
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-option">Home</a></li>
        <li><a href="services.html" class="nav-option">Services</a></li>
        <li><a href="about.html" class="nav-option">About</a></li>
        <li><a href="reviews.html" class="nav-option">Reviews</a></li>
        <li><a href="gallery.html" class="nav-option">Gallery</a></li>
        <li><a href="contact.html" class="contact-btn">Get Quote</a></li>
      </ul>
    </nav>

    <!-- Gallery Header -->
    <div class="gallery-header">
      <h1>Our Work Gallery</h1>
      <p>Browse through our recent projects and see the quality of our work</p>
    </div>

    <!-- Admin Controls (Easy photo addition) -->
    <div class="admin-controls">
      <button class="add-photo-btn" id="showUploadBtn">+ Add New Photo</button>
    </div>

    <!-- Upload Form -->
    <div class="upload-form" id="uploadForm">
      <h3>Add New Photo</h3>
      <input type="text" id="photoTitle" placeholder="Photo title (e.g., Driveway Pressure Washing)">
      <textarea id="photoDesc" placeholder="Description (optional)" rows="2"></textarea>
      <input type="file" id="photoFile" accept="image/*">
      <button id="savePhotoBtn">Save Photo</button>
      <button id="cancelUploadBtn" style="background: #ccc; margin-left: 10px;">Cancel</button>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
      <!-- Photos will be dynamically added here -->
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
      <span class="close-lightbox">&times;</span>
      <img id="lightboxImg" src="" alt="">
    </div>

    <!-- Footer -->
    <footer>
      <p>© 2026 Inalyze Property</p>
      <p>Top quality service you can trust</p>
    </footer>
  </div>

  <script>
    // Gallery management with localStorage (easy for admin to add photos)
    let galleryPhotos = [];
    
    // Load photos from localStorage
    function loadPhotos() {
      const saved = localStorage.getItem('galleryPhotos');
      if (saved) {
        galleryPhotos = JSON.parse(saved);
      } else {
        // Default sample photos
        galleryPhotos = [
          { id: 1, title: "Driveway Pressure Washing", description: "Before and after showing amazing results", image: "https://placehold.co/600x400/e2e8f0/02093f?text=Driveway+Cleaning" },
          { id: 2, title: "House Exterior Wash", description: "Complete house refresh", image: "https://placehold.co/600x400/e2e8f0/02093f?text=House+Washing" },
          { id: 3, title: "Deck Restoration", description: "Like new deck after our treatment", image: "https://placehold.co/600x400/e2e8f0/02093f?text=Deck+Cleaning" },
          { id: 4, title: "Window Cleaning", description: "Streak-free crystal clear windows", image: "https://placehold.co/600x400/e2e8f0/02093f?text=Window+Cleaning" },
          { id: 5, title: "Gutter Cleaning", description: "Clean gutters for proper drainage", image: "https://placehold.co/600x400/e2e8f0/02093f?text=Gutter+Service" },
          { id: 6, title: "Lawn Care", description: "Perfectly manicured lawn", image: "https://placehold.co/600x400/e2e8f0/02093f?text=Lawn+Care" }
        ];
        savePhotos();
      }
      renderGallery();
    }
    
    function savePhotos() {
      localStorage.setItem('galleryPhotos', JSON.stringify(galleryPhotos));
    }
    
    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      if (!grid) return;
      
      grid.innerHTML = galleryPhotos.map(photo => `
        <div class="gallery-item" onclick="openLightbox('${photo.image}', '${photo.title}')">
          <img src="${photo.image}" alt="${photo.title}" loading="lazy">
          <div class="gallery-info">
            <h3>${photo.title}</h3>
            <p>${photo.description || ''}</p>
          </div>
        </div>
      `).join('');
    }
    
    function openLightbox(imageSrc, title) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      lightboxImg.src = imageSrc;
      lightboxImg.alt = title;
      lightbox.classList.add('active');
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    
    // Add new photo
    function addPhoto(title, description, imageData) {
      const newPhoto = {
        id: Date.now(),
        title: title,
        description: description,
        image: imageData
      };
      galleryPhotos.push(newPhoto);
      savePhotos();
      renderGallery();
    }
    
    // Handle file upload
    document.getElementById('showUploadBtn')?.addEventListener('click', () => {
      const form = document.getElementById('uploadForm');
      form.classList.toggle('active');
    });
    
    document.getElementById('cancelUploadBtn')?.addEventListener('click', () => {
      document.getElementById('uploadForm').classList.remove('active');
      document.getElementById('photoTitle').value = '';
      document.getElementById('photoDesc').value = '';
      document.getElementById('photoFile').value = '';
    });
    
    document.getElementById('savePhotoBtn')?.addEventListener('click', () => {
      const title = document.getElementById('photoTitle').value;
      const description = document.getElementById('photoDesc').value;
      const file = document.getElementById('photoFile').files[0];
      
      if (!title) {
        alert('Please enter a photo title');
        return;
      }
      
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          addPhoto(title, description, e.target.result);
          document.getElementById('uploadForm').classList.remove('active');
          document.getElementById('photoTitle').value = '';
          document.getElementById('photoDesc').value = '';
          document.getElementById('photoFile').value = '';
          alert('Photo added successfully!');
        };
        reader.readAsDataURL(file);
      } else {
        alert('Please select an image file');
      }
    });
    
    // Lightbox event listeners
    document.querySelector('.close-lightbox')?.addEventListener('click', closeLightbox);
    document.getElementById('lightbox')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    
    // Initialize gallery
    loadPhotos();
  </script>
</body>
</html>
