<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Photo Gallery | Inalyze Property Management</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="navbar-spacer"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="./images/Logo FULL.PNG" alt="Inalyze Property Logo">
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-option">Home</a></li>
      <li><a href="#services" class="nav-option">Services</a></li>
      <li><a href="#about" class="nav-option">About</a></li>
      <li><a href="#reviews" class="nav-option">Reviews</a></li>
      <li><a href="gallery.html" class="nav-option">Gallery</a></li>
      <li><a href="contact.html" class="contact-btn">Get Quote</a></li>
    </ul>
  </nav>

  <div class="container">
    <!-- Gallery Header -->
    <div class="gallery-header">
      <h1>Our Work Gallery</h1>
      <p>Browse through our recent projects and see the quality of our work</p>
    </div>

    <!-- Optional Sort Dropdown (hidden when no photos) -->
    <div style="text-align: right; margin-bottom: 20px;" id="sortContainer" style="display: none;">
      <select id="sortSelect" style="padding: 8px 16px; border-radius: 40px; border: 1px solid #ddd; background: white; cursor: pointer;">
        <option value="default">Default Order</option>
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="title">Sort by Title</option>
      </select>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
      <span class="close-lightbox">&times;</span>
      <img id="lightboxImg" src="" alt="">
    </div>

    <!-- Footer -->
    <footer>
      <p>© 2026 Inalyze Property</p>
      <p>Top quality service you can trust</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
